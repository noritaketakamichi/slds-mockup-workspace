<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}} - 詳細</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@salesforce-ux/design-system/assets/styles/salesforce-lightning-design-system.min.css"
    />
    <style>
      body {
        font-family: "Salesforce Sans", Arial, sans-serif;
      }
      .app-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="slds-scope">
      <div class="app-container">

        <!-- レコードヘッダー -->
        <div class="slds-page-header">
          <div class="slds-page-header__row">
            <div class="slds-page-header__col-title">
              <div class="slds-media">
                <div class="slds-media__body">
                  <div class="slds-page-header__name">
                    <div class="slds-page-header__name-title">
                      <h1>
                        <span class="slds-page-header__title slds-truncate">{{RECORD_NAME}}</span>
                      </h1>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="slds-page-header__col-actions">
              <div class="slds-page-header__controls">
                <div class="slds-page-header__control">
                  <button class="slds-button slds-button_neutral">編集</button>
                  <button class="slds-button slds-button_destructive slds-m-left_x-small">削除</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 詳細フォーム (Stacked) -->
        <article class="slds-card slds-m-top_medium">
          <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
              <div class="slds-media__body">
                <h2 class="slds-card__header-title">
                  <span>詳細情報</span>
                </h2>
              </div>
            </header>
          </div>
          <div class="slds-card__body slds-card__body_inner">
            <div class="slds-form slds-form_stacked">

              <div class="slds-form-element slds-m-bottom_small">
                <label class="slds-form-element__label">項目1</label>
                <div class="slds-form-element__control">
                  <span class="slds-form-element__static">値1</span>
                </div>
              </div>

              <div class="slds-form-element slds-m-bottom_small">
                <label class="slds-form-element__label">項目2</label>
                <div class="slds-form-element__control">
                  <span class="slds-form-element__static">値2</span>
                </div>
              </div>

              <div class="slds-form-element slds-m-bottom_small">
                <label class="slds-form-element__label">項目3</label>
                <div class="slds-form-element__control">
                  <span class="slds-form-element__static">値3</span>
                </div>
              </div>

            </div>
          </div>
        </article>

        <!-- 関連リスト -->
        <article class="slds-card slds-m-top_medium">
          <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
              <div class="slds-media__body">
                <h2 class="slds-card__header-title">
                  <span>関連レコード</span>
                </h2>
              </div>
            </header>
          </div>
          <div class="slds-card__body slds-card__body_inner">
            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
              <thead>
                <tr class="slds-line-height_reset">
                  <th scope="col"><div class="slds-truncate" title="名前">名前</div></th>
                  <th scope="col"><div class="slds-truncate" title="ステータス">ステータス</div></th>
                </tr>
              </thead>
              <tbody>
                <tr class="slds-hint-parent">
                  <td><div class="slds-truncate">関連レコード1</div></td>
                  <td><div class="slds-truncate">有効</div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>

      </div>
    </div>
  </body>
</html>
