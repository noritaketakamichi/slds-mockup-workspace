<!-- ============================================
     グローバルナビゲーション + タブバー
     ============================================ -->

<!-- グローバルナビ -->
<div class="slds-context-bar">
  <div class="slds-context-bar__primary">
    <div class="slds-context-bar__item slds-context-bar__dropdown-trigger slds-dropdown-trigger slds-dropdown-trigger_click slds-no-hover">
      <div class="slds-context-bar__icon-action">
        <button class="slds-button slds-icon-waffle_container slds-context-bar__button" title="アプリランチャー">
          <span class="slds-icon-waffle">
            <span class="slds-r1"></span>
            <span class="slds-r2"></span>
            <span class="slds-r3"></span>
            <span class="slds-r4"></span>
            <span class="slds-r5"></span>
            <span class="slds-r6"></span>
            <span class="slds-r7"></span>
            <span class="slds-r8"></span>
            <span class="slds-r9"></span>
          </span>
        </button>
      </div>
      <span class="slds-context-bar__label-action slds-context-bar__app-name">
        <span class="slds-truncate" title="{{APP_NAME}}">{{APP_NAME}}</span>
      </span>
    </div>
  </div>
  <nav class="slds-context-bar__secondary" role="navigation">
    <ul class="slds-grid">
      <!-- ナビタブ: is-active を付けて現在のオブジェクトを強調 -->
      <li class="slds-context-bar__item slds-is-active">
        <a href="#" class="slds-context-bar__label-action" title="{{NAV_TAB_1}}">
          <span class="slds-truncate" title="{{NAV_TAB_1}}">{{NAV_TAB_1}}</span>
        </a>
      </li>
      <li class="slds-context-bar__item">
        <a href="#" class="slds-context-bar__label-action" title="{{NAV_TAB_2}}">
          <span class="slds-truncate" title="{{NAV_TAB_2}}">{{NAV_TAB_2}}</span>
        </a>
      </li>
      <li class="slds-context-bar__item">
        <a href="#" class="slds-context-bar__label-action" title="{{NAV_TAB_3}}">
          <span class="slds-truncate" title="{{NAV_TAB_3}}">{{NAV_TAB_3}}</span>
        </a>
      </li>
    </ul>
  </nav>
</div>

<!-- レコードタブバー -->
<div class="slds-context-bar slds-context-bar_tabs" style="border-top: 1px solid #d8dde6;">
  <nav class="slds-context-bar__secondary" role="navigation">
    <ul class="slds-grid">
      <li class="slds-context-bar__item slds-context-bar__item_tab slds-is-active" role="presentation">
        <a href="#" class="slds-context-bar__label-action" role="tab" title="{{RECORD_ID}} | {{OBJECT_LABEL}}">
          <span class="slds-truncate" title="{{RECORD_ID}} | {{OBJECT_LABEL}}">{{RECORD_ID}} | {{OBJECT_LABEL}}</span>
        </a>
        <div class="slds-context-bar__icon-action slds-context-bar__icon-action_container">
          <button class="slds-button slds-button_icon slds-button_icon-container slds-button_icon-x-small" title="閉じる">
            <span style="font-size:0.65rem;">✕</span>
            <span class="slds-assistive-text">閉じる</span>
          </button>
        </div>
      </li>
    </ul>
  </nav>
</div>
