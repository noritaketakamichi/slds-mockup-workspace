<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オーダーグループ内商品を編集</title>
    <link rel="stylesheet" href="https://unpkg.com/@salesforce-ux/design-system/assets/styles/salesforce-lightning-design-system.min.css" />
    <style>
      body { margin: 0; font-family: "Salesforce Sans", Arial, sans-serif; background: #f3f3f3; }
      .sf-global-header { display: flex; align-items: center; justify-content: space-between; background: #032D60; height: 40px; padding: 0 0.75rem; }
      .sf-global-header__search { display: flex; align-items: center; background: rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 12px; min-width: 260px; color: rgba(255,255,255,0.7); font-size: 0.8125rem; }
      .sf-global-header__search svg { margin-right: 6px; opacity: 0.7; }
      .sf-global-header__right { display: flex; align-items: center; gap: 4px; }
      .sf-global-header__right button { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
      .sf-global-header__right button svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.8); }
      .page-header { background: #fff; border-bottom: 1px solid #d8dde6; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
      .page-header__icon { width: 40px; height: 40px; border-radius: 6px; background: #706e6b; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .page-header__icon svg { width: 24px; height: 24px; fill: #fff; }
      .page-header__id { font-size: 0.75rem; color: #706e6b; }
      .page-header__title { font-size: 1.125rem; font-weight: 700; color: #181818; }
      .edit-content { padding: 1rem 1.5rem; max-width: 1200px; margin: 0 auto; padding-bottom: 5rem; }
      .required-note { text-align: right; font-size: 0.75rem; color: #c23934; margin-bottom: 1rem; }
      .product-section { background: #fff; border: 1px solid #d8dde6; border-radius: 4px; margin-bottom: 1rem; }
      .product-section__header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: #f3f3f3; border-bottom: 1px solid #d8dde6; border-radius: 4px 4px 0 0; cursor: pointer; }
      .product-section__title { font-size: 0.875rem; font-weight: 700; color: #181818; }
      .product-section__toggle { width: 20px; height: 20px; background: none; border: 1px solid #d8dde6; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #706e6b; }
      .product-section__toggle svg { width: 14px; height: 14px; fill: #706e6b; }
      .product-section__body { padding: 1rem; }
      .product-section__body.is-hidden { display: none; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
      .field-item__label { font-size: 0.75rem; color: #181818; margin-bottom: 4px; display: block; }
      .field-item__label .required { color: #c23934; margin-right: 2px; }
      .field-input { width: 100%; height: 32px; border: 1px solid #d8dde6; border-radius: 4px; padding: 0 8px; font-size: 0.8125rem; color: #181818; background: #fff; box-sizing: border-box; }
      .field-input-with-icon { position: relative; }
      .field-input-with-icon input { padding-right: 32px; }
      .field-input-with-icon__icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #706e6b; display: flex; align-items: center; }
      .field-input-with-icon__icon svg { width: 16px; height: 16px; fill: #706e6b; }
      select.field-input { appearance: auto; }
      .slot-area { margin-top: 1rem; }
      .slot-area__label { font-size: 0.8125rem; color: #706e6b; margin-bottom: 0.5rem; }
      .slot-tables { display: flex; gap: 1.5rem; }
      .slot-table-wrapper { flex: 1; }
      .slot-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
      .slot-table thead th { padding: 8px 10px; text-align: left; font-weight: 600; color: #181818; border-bottom: 1px solid #d8dde6; background: #fafaf9; }
      .slot-table thead th .header-content { display: flex; align-items: center; gap: 6px; }
      .slot-table thead th input[type="checkbox"] { accent-color: #0070d2; width: 16px; height: 16px; }
      .slot-table tbody td { padding: 8px 10px; border-bottom: 1px solid #e5e5e5; vertical-align: middle; }
      .slot-table tbody td input[type="checkbox"] { accent-color: #0070d2; width: 16px; height: 16px; }
      .slot-table a { color: #0070d2; text-decoration: none; }
      .slot-table a:hover { text-decoration: underline; }
      .slot-select { width: 100%; height: 28px; border: 1px solid #d8dde6; border-radius: 4px; padding: 0 6px; font-size: 0.8125rem; color: #706e6b; background: #fff; appearance: auto; }
      .slot-num { color: #706e6b; width: 24px; text-align: center; }
      .page-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #d8dde6; padding: 0.75rem 1.5rem; display: flex; justify-content: flex-end; gap: 0.5rem; z-index: 10; }
    </style>
  </head>
  <body>
    <div class="slds-scope">
      <div class="sf-global-header">
        <div></div>
        <div class="sf-global-header__search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          検索...
        </div>
        <div class="sf-global-header__right">
          <button title="印刷"><svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg></button>
          <button title="お気に入り"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
          <button title="ヘルプ"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg></button>
          <button title="設定"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
          <button title="通知"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
        </div>
      </div>
      <div class="page-header">
        <div class="page-header__icon"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45C5.09 14.32 5 14.66 5 15c0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
        <div>
          <div class="page-header__id">ODG-540276</div>
          <div class="page-header__title">オーダーグループ内商品を編集</div>
        </div>
      </div>
      <div class="edit-content">
        <div class="required-note"><span style="color:#c23934;">*</span> = 必要な情報</div>
        <!-- コース商品セクション -->
        <div class="product-section" id="section-course">
          <div class="product-section__header" onclick="toggleProductSection('course')">
            <span class="product-section__title">[新規] 2025小6継続個別コース商品テスト</span>
            <button class="product-section__toggle" id="toggle-course"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></button>
          </div>
          <div class="product-section__body" id="body-course">
            <div class="field-row">
              <div class="field-item"><label class="field-item__label">割引</label><select class="field-input"><option>--</option><option>10%</option><option>20%</option><option>50%</option></select></div>
              <div class="field-item"><label class="field-item__label">変更日</label><div class="field-input-with-icon"><input type="text" class="field-input" placeholder="" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
              <div class="field-item"><label class="field-item__label"><span class="required">*</span>開始日</label><div class="field-input-with-icon"><input type="text" class="field-input" value="2026/03/01" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
              <div class="field-item"><label class="field-item__label"><span class="required">*</span>終了日</label><div class="field-input-with-icon"><input type="text" class="field-input" value="2026/03/31" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
            </div>
            <div class="slot-area">
              <div class="slot-area__label">最大のスロット数 = 4</div>
              <div class="slot-tables">
                <div class="slot-table-wrapper">
                  <table class="slot-table">
                    <thead><tr><th style="width:32px;"><input type="checkbox" checked /></th><th><div class="header-content">コース <svg width="10" height="10" viewBox="0 0 24 24" fill="#706e6b"><path d="M7 10l5 5 5-5z"/></svg></div></th><th><div class="header-content">スロット <svg width="10" height="10" viewBox="0 0 24 24" fill="#706e6b"><path d="M7 10l5 5 5-5z"/></svg></div></th></tr></thead>
                    <tbody>
                      <tr><td style="width:32px;"><input type="checkbox" checked /></td><td class="slot-num">1</td><td><a href="#">[2025_test] 小6社会</a></td><td><select class="slot-select"><option>1</option><option>2</option><option>3</option><option>4</option></select></td></tr>
                      <tr><td style="width:32px;"><input type="checkbox" checked /></td><td class="slot-num">2</td><td><a href="#">[2025_test] 小6理科</a></td><td><select class="slot-select"><option>1</option><option>2</option><option>3</option><option>4</option></select></td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="slot-table-wrapper">
                  <table class="slot-table">
                    <thead><tr><th style="width:32px;"><input type="checkbox" /></th><th><div class="header-content">付随商品 <svg width="10" height="10" viewBox="0 0 24 24" fill="#706e6b"><path d="M7 10l5 5 5-5z"/></svg></div></th></tr></thead>
                    <tbody><tr><td colspan="2" style="text-align: center; color: #706e6b; padding: 1rem;">付随商品はありません</td></tr></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- 入会費セクション -->
        <div class="product-section" id="section-admission">
          <div class="product-section__header" onclick="toggleProductSection('admission')">
            <span class="product-section__title">[新規] 入会費</span>
            <button class="product-section__toggle" id="toggle-admission"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></button>
          </div>
          <div class="product-section__body" id="body-admission">
            <div class="field-row">
              <div class="field-item"><label class="field-item__label">割引</label><select class="field-input"><option>--</option><option>10%</option><option>20%</option><option>50%</option></select></div>
              <div class="field-item"><label class="field-item__label">変更日</label><div class="field-input-with-icon"><input type="text" class="field-input" placeholder="" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
              <div class="field-item"><label class="field-item__label"><span class="required">*</span>開始日</label><div class="field-input-with-icon"><input type="text" class="field-input" placeholder="" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
              <div class="field-item"><label class="field-item__label"><span class="required">*</span>終了日</label><div class="field-input-with-icon"><input type="text" class="field-input" placeholder="" /><button class="field-input-with-icon__icon" title="日付選択"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></button></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="page-footer">
        <button class="slds-button slds-button_neutral" id="btnCancel">キャンセル</button>
        <button class="slds-button slds-button_brand" id="btnExecute">実行</button>
      </div>
    </div>
    <script>
      function toggleProductSection(sectionId) {
        var body = document.getElementById('body-' + sectionId);
        var toggle = document.getElementById('toggle-' + sectionId);
        if (body.classList.contains('is-hidden')) { body.classList.remove('is-hidden'); toggle.querySelector('svg').style.transform = ''; }
        else { body.classList.add('is-hidden'); toggle.querySelector('svg').style.transform = 'rotate(-90deg)'; }
      }
      var buttonHandlers = {
        btnCancel: function() { window.location.href = 'product-select.html'; },
        btnExecute: function() { window.location.href = 'product-add-change.html'; }
      };
      Object.keys(buttonHandlers).forEach(function(id) { var el = document.getElementById(id); if (el) el.addEventListener('click', buttonHandlers[id]); });
    </script>
  </body>
</html>
